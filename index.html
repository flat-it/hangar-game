<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE HANGAR — Drone Wonderland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07080f;
  --bg2:      #0d0f1c;
  --bg3:      #13162a;
  --surface:  #1a1e35;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --text:     #e8eaf0;
  --muted:    #7a7f9a;
  --teal:     #00e5b0;
  --teal-dim: #00e5b020;
  --blue:     #4da6ff;
  --blue-dim: #4da6ff20;
  --amber:    #ffb830;
  --amber-dim:#ffb83020;
  --pink:     #ff6eb0;
  --pink-dim: #ff6eb020;
  --green:    #4cde80;
  --red:      #ff5f5f;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --font-head: 'Orbitron', monospace;
  --font-body: 'Noto Sans JP', sans-serif;
  --maxw: 430px;
  --navh: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, #1a1f4020 0%, var(--bg) 70%);
}

#app {
  width: 100%;
  max-width: var(--maxw);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--bg);
  overflow: hidden;
}

/* ── HEADER ── */
#header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--teal);
  text-shadow: 0 0 18px var(--teal);
}

.player-tabs {
  display: flex;
  gap: 6px;
}

.player-tab {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 12px;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}

.player-tab.active {
  background: var(--teal-dim);
  border-color: var(--teal);
  color: var(--teal);
}

/* ── HERO CARD ── */
#hero {
  background: var(--bg2);
  padding: 14px 16px 16px;
  border-bottom: 1px solid var(--border);
}

.hero-inner {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 14px;
}

.badge-area {
  flex-shrink: 0;
  width: 60px;
  height: 60px;
}

.badge-area svg { width: 60px; height: 60px; }

.hero-info { flex: 1; min-width: 0; }

.hero-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.rank-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-head);
  letter-spacing: .05em;
}

.rank-badge.beginner { background: var(--teal-dim); border: 1px solid var(--teal); color: var(--teal); }
.rank-badge.middle   { background: var(--blue-dim); border: 1px solid var(--blue); color: var(--blue); }
.rank-badge.advanced { background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); }
.rank-badge.expert   { background: var(--pink-dim); border: 1px solid var(--pink); color: var(--pink); }

.pt-display {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 6px;
}

.pt-num {
  font-family: var(--font-head);
  font-size: 30px;
  font-weight: 700;
  color: var(--amber);
  text-shadow: 0 0 20px var(--amber);
  line-height: 1;
}

.pt-unit { font-size: 12px; color: var(--muted); }
.pt-next { font-size: 11px; color: var(--muted); margin-left: 4px; }

.progress-track {
  height: 5px;
  background: var(--surface);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .5s ease;
}

.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  overflow-y: auto;
  padding-bottom: var(--navh);
  scroll-behavior: smooth;
}

.screen { display: none; }
.screen.active { display: block; }

/* ── SECTION LABEL ── */
.sec-label {
  font-family: var(--font-head);
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--muted);
  padding: 14px 16px 6px;
}

/* ── MISSION CARDS ── */
.missions { padding: 0 12px; }

.mission-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color .15s, opacity .15s;
  position: relative;
  overflow: hidden;
}

.mission-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 2px 0 0 2px;
}

.mission-item.cleared::before { background: var(--teal); }
.mission-item.available::before { background: var(--blue); }
.mission-item.locked { opacity: .38; }
.mission-item.locked::before { background: var(--muted); }

.mission-icon-wrap {
  width: 40px; height: 40px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.mission-body { flex: 1; min-width: 0; }

.mission-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mission-desc {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.mission-right { text-align: right; flex-shrink: 0; }

.mission-pt {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  color: var(--amber);
}

.mission-status-done {
  font-size: 10px;
  color: var(--teal);
  margin-top: 2px;
}

.mission-lock-pill {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--bg3);
  color: var(--muted);
  border: 1px solid var(--border);
}

.rank-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  margin-bottom: 4px;
}

.rank-divider-line { flex: 1; height: 1px; background: var(--border); }
.rank-divider-label {
  font-size: 10px;
  font-family: var(--font-head);
  letter-spacing: .08em;
}

/* ── BADGE SCREEN ── */
.badge-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  padding: 8px 14px 16px;
}

.badge-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.badge-cell svg { width: 58px; height: 58px; transition: transform .2s; }
.badge-cell:hover svg { transform: scale(1.08); }
.badge-cell.locked { opacity: .25; }

.badge-cell-name {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
}

/* ── RANKING SCREEN ── */
.rank-list { padding: 0; }

.rank-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}

.rank-row.me { background: rgba(77,166,255,.07); }

.rank-pos {
  width: 24px;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  flex-shrink: 0;
}

.pos-1 { color: var(--amber); text-shadow: 0 0 10px var(--amber); }
.pos-2 { color: #c0c0c0; }
.pos-3 { color: #cd7f32; }

.rank-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.rank-name-col { flex: 1; }
.rank-name { font-size: 13px; font-weight: 500; color: var(--text); }
.rank-level { font-size: 10px; color: var(--muted); margin-top: 1px; }
.rank-pt-col {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  color: var(--amber);
  white-space: nowrap;
}

/* ── EVENT CARDS ── */
.events { padding: 0 12px 16px; }

.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  margin-bottom: 10px;
}

.event-head {
  background: var(--bg3);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.event-title {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: .06em;
}

.event-pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}

.pill-open  { background: rgba(0,229,176,.15); color: var(--teal); border: 1px solid rgba(0,229,176,.3); }
.pill-close { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

.event-body { padding: 12px 14px; }
.event-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

.podium-wrap { display: flex; gap: 6px; align-items: flex-end; margin-top: 8px; }

.podium-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.podium-pname { font-size: 10px; color: var(--muted); }

.podium-bar {
  width: 100%;
  border-radius: 4px 4px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
  font-family: var(--font-head);
}

/* ── SHOP SCREEN ── */
.shop-header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 6px;
}

.my-pt-disp {
  font-family: var(--font-head);
  font-size: 13px;
  color: var(--amber);
}

.shop-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  padding: 0 12px 16px;
}

.shop-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  transition: border-color .15s;
}

.shop-card:hover { border-color: var(--border2); }

.shop-art {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.shop-body { padding: 8px 10px 10px; }

.shop-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}

.shop-cost {
  font-family: var(--font-head);
  font-size: 12px;
  color: var(--amber);
  margin-top: 2px;
}

.shop-btn {
  margin-top: 8px;
  width: 100%;
  padding: 6px;
  font-size: 11px;
  font-family: var(--font-body);
  border-radius: var(--r-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
}

.shop-btn:hover:not(:disabled) { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
.shop-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── BOTTOM NAV ── */
#nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: var(--maxw);
  height: var(--navh);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: color .15s;
  padding-bottom: 6px;
}

.nav-btn svg { width: 20px; height: 20px; }
.nav-btn.active { color: var(--teal); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: calc(var(--navh) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--teal);
  color: var(--teal);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  opacity: 0;
  transition: all .3s;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── ANIMATIONS ── */
@keyframes slideUp {
  from { transform: translateY(10px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.mission-item { animation: slideUp .25s ease both; }

@keyframes glow-pulse {
  0%, 100% { text-shadow: 0 0 20px var(--amber); }
  50%       { text-shadow: 0 0 35px var(--amber), 0 0 60px var(--amber60); }
}

.pt-num { animation: glow-pulse 3s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="header-top">
      <div class="logo">THE HANGAR</div>
      <div class="player-tabs" id="playerTabs"></div>
    </div>
  </div>

  <div id="hero">
    <div class="hero-inner">
      <div class="badge-area">
        <svg id="heroBadgeSvg" viewBox="0 0 60 60"></svg>
      </div>
      <div class="hero-info">
        <div class="hero-name" id="heroName">—</div>
        <div><span class="rank-badge" id="heroRankBadge"></span></div>
      </div>
      <div class="pt-display">
        <span class="pt-num" id="heroPt">0</span>
        <span class="pt-unit">pt</span>
        <span class="pt-next" id="heroNext"></span>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progFill"></div>
    </div>
    <div class="progress-labels">
      <span id="progFrom"></span>
      <span id="progTo"></span>
    </div>
  </div>

  <div id="main">
    <div id="screen-home" class="screen active"></div>
    <div id="screen-badge" class="screen"></div>
    <div id="screen-rank" class="screen"></div>
    <div id="screen-shop" class="screen"></div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" id="nb-home" onclick="switchTab('home')">
      <svg viewBox="0 0 20 20" fill="none"><path d="M2 9L10 2l8 7v9a1 1 0 01-1 1H3a1 1 0 01-1-1V9z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      ホーム
    </button>
    <button class="nav-btn" id="nb-badge" onclick="switchTab('badge')">
      <svg viewBox="0 0 20 20" fill="none"><polygon points="10,2 12.5,7.5 18.5,8 14,12.5 15.5,18.5 10,15.5 4.5,18.5 6,12.5 1.5,8 7.5,7.5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      バッジ
    </button>
    <button class="nav-btn" id="nb-rank" onclick="switchTab('rank')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="1" y="11" width="5" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="7.5" y="7" width="5" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="14" y="2" width="5" height="17" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
      ランキング
    </button>
    <button class="nav-btn" id="nb-shop" onclick="switchTab('shop')">
      <svg viewBox="0 0 20 20" fill="none"><path d="M2 5h16L16 14H4L2 5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="6.5" cy="17" r="1.4" fill="currentColor"/><circle cx="13.5" cy="17" r="1.4" fill="currentColor"/></svg>
      ショップ
    </button>
  </nav>

</div>

<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────

const RANKS = ['beginner','middle','advanced','expert'];

const RANK_META = {
  beginner: { label:'初級パイロット', color:'#00e5b0', next: 20,  progTo:'中級 20pt',  from:'初級' },
  middle:   { label:'中級パイロット', color:'#4da6ff', next: 100, progTo:'上級 100pt', from:'中級' },
  advanced: { label:'上級パイロット', color:'#ffb830', next: 200, progTo:'エキスパ 200pt', from:'上級' },
  expert:   { label:'エキスパート',   color:'#ff6eb0', next: null, progTo:'最高ランク', from:'エキスパ' },
};

const RANK_THRESHOLD = { beginner: 0, middle: 20, advanced: 100, expert: 200 };

function ptToRank(pt) {
  if (pt >= 200) return 'expert';
  if (pt >= 100) return 'advanced';
  if (pt >= 20)  return 'middle';
  return 'beginner';
}

const PLAYERS = [
  { id:'p1', name:'たろう',  pt:38,  clearedIds:['m1','m2','m5'] },
  { id:'p2', name:'はなこ',  pt:8,   clearedIds:['m1'] },
  { id:'p3', name:'けんた',  pt:147, clearedIds:['m1','m2','m3','m4','m5','m6','m7','m9'] },
];

// ミッション定義 — requiredRank: このランク以上で表示
const MISSIONS = [
  // 初級
  { id:'m1',  name:'的当てゲーム',    desc:'トイドローンでお菓子を落とせ',   pt:1, requiredRank:'beginner', category:'初級', icon:'target',  color:'#00e5b0' },
  { id:'m2',  name:'風船割3個',       desc:'時間内に3個以上割る',            pt:2, requiredRank:'beginner', category:'初級', icon:'balloon', color:'#00e5b0' },
  { id:'m3',  name:'輪くぐり300点',   desc:'Skykickで300点以上',             pt:2, requiredRank:'beginner', category:'初級', icon:'ring',    color:'#00e5b0' },
  // 中級
  { id:'m4',  name:'等高度撮影',      desc:'Mini2で5分以内に完了',           pt:3, requiredRank:'middle', category:'中級', icon:'camera',  color:'#4da6ff' },
  { id:'m5',  name:'ドローンアスレチック', desc:'所定の操作を全クリア',       pt:3, requiredRank:'middle', category:'中級', icon:'athletic',color:'#4da6ff' },
  // 上級
  { id:'m6',  name:'オリエンテーション', desc:'QR謎解きでHANGARを探索',      pt:4, requiredRank:'advanced', category:'上級', icon:'qr',      color:'#ffb830' },
  { id:'m7',  name:'パノラマ撮影',    desc:'30〜100m上空を自由撮影',         pt:4, requiredRank:'advanced', category:'上級', icon:'panorama',color:'#ffb830' },
  { id:'m8',  name:'FPVタイムアタック', desc:'アリーナ3周のタイムを競う',    pt:5, requiredRank:'advanced', category:'FPV', icon:'fpv',     color:'#ff6eb0' },
  { id:'m9',  name:'屋根裏探検ツアー', desc:'AVATAでダクト内を撮影',         pt:5, requiredRank:'advanced', category:'FPV', icon:'explore', color:'#ff6eb0' },
  // エキスパ
  { id:'m10', name:'月間ランキングTOP3', desc:'今月の上位3位に入る',         pt:10, requiredRank:'expert', category:'HANGAR杯', icon:'trophy', color:'#ff6eb0' },
];

const BADGES = [
  { id:'bg-beginner', name:'初級認定',    rank:'beginner', unlock:'beginner' },
  { id:'bg-middle',   name:'中級認定',    rank:'middle',   unlock:'middle'   },
  { id:'bg-advanced', name:'上級認定',    rank:'advanced', unlock:'advanced' },
  { id:'bg-expert',   name:'エキスパート', rank:'expert',  unlock:'expert'   },
  { id:'bg-m5',       name:'5ミッション', rank:'mission5', unlock:(p)=> p.clearedIds.length >= 5 },
  { id:'bg-m10',      name:'10ミッション',rank:'mission10',unlock:(p)=> p.clearedIds.length >= 10},
  { id:'bg-hangar',   name:'HANGAR杯',   rank:'hangar',   unlock:'never'    },
  { id:'bg-fpv',      name:'FPVマスター', rank:'fpv',      unlock:(p)=> p.clearedIds.includes('m8') },
];

const RANKING = [
  { name:'よしき', initials:'YK', pt:142, rank:'advanced', col:'#FAEEDA', tcol:'#633806' },
  { name:'りなこ', initials:'RN', pt:98,  rank:'middle',   col:'#1a2a40', tcol:'#4da6ff' },

// ── BADGE DRAWING ─────────────────────────────────────

const BADGE_CFG = {
  beginner:  { bg:'#00e5b020', stroke:'#00e5b0', fill:'#00e5b0', label:'初',  fc:'#004d3d' },
  middle:    { bg:'#4da6ff20', stroke:'#4da6ff', fill:'#4da6ff', label:'中',  fc:'#0a3060' },
  advanced:  { bg:'#ffb83020', stroke:'#ffb830', fill:'#ffb830', label:'上',  fc:'#5a3a00' },
  expert:    { bg:'#ff6eb020', stroke:'#ff6eb0', fill:'#ff6eb0', label:'EX',  fc:'#5a1030' },
  mission5:  { bg:'#4cde8020', stroke:'#4cde80', fill:'#4cde80', label:'×5',  fc:'#0a3020' },
  mission10: { bg:'#4cde8030', stroke:'#4cde80', fill:'#4cde80', label:'×10', fc:'#0a3020' },
  hangar:    { bg:'#7a7f9a20', stroke:'#7a7f9a', fill:'#7a7f9a', label:'H',   fc:'#2a2a3a' },
  fpv:       { bg:'#ff5f5f20', stroke:'#ff5f5f', fill:'#ff5f5f', label:'FPV', fc:'#4a0000' },
};

function drawBadgeSvg(svgEl, rankKey, size) {
  const s = size || 60;
  const h = s / 2;
  const c = BADGE_CFG[rankKey] || BADGE_CFG.beginner;
  const pts = 6, ro = h - 3, ri = ro * 0.7;
  let star = '';
  for (let i = 0; i < pts * 2; i++) {
    const ang = (i * Math.PI / pts) - Math.PI / 2;
    const r = i % 2 === 0 ? ro : ri;
    const x = h + r * Math.cos(ang);
    const y = h + r * Math.sin(ang);
    star += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2);
  }
  star += 'Z';
  const fs = rankKey === 'fpv' || rankKey === 'mission10' ? Math.floor(s * 0.16) : Math.floor(s * 0.2);
  svgEl.setAttribute('viewBox', `0 0 ${s} ${s}`);
  svgEl.innerHTML = `
    <path d="${star}" fill="${c.bg}" stroke="${c.stroke}" stroke-width="1.6"/>
    <circle cx="${h}" cy="${h}" r="${h * 0.38}" fill="${c.fill}" opacity="0.25"/>
    <circle cx="${h}" cy="${h}" r="${h * 0.28}" fill="${c.fill}" opacity="0.5"/>
    <text x="${h}" y="${h}" text-anchor="middle" dominant-baseline="central"
      font-size="${fs}" font-weight="700" fill="${c.fc}" font-family="'Orbitron',monospace">${c.label}</text>
  `;
}

// ── SHOP ART ──────────────────────────────────────────

// ── RENDER: HERO ──────────────────────────────────────

function renderHero() {
  const p = currentPlayer();
  const rank = ptToRank(p.pt);
  const meta = RANK_META[rank];

  document.getElementById('heroName').textContent = p.name;
  document.getElementById('heroPt').textContent = p.pt;

  const pill = document.getElementById('heroRankBadge');
  pill.className = 'rank-badge ' + rank;
  pill.textContent = meta.label;

  const fill = document.getElementById('progFill');
  const thresholds = Object.values(RANK_THRESHOLD);
  const low = RANK_THRESHOLD[rank];
  const high = meta.next ? RANK_THRESHOLD[RANKS[RANKS.indexOf(rank) + 1]] : low + 100;
  const pct = meta.next ? Math.min(100, Math.round(((p.pt - low) / (high - low)) * 100)) : 100;
  fill.style.width = pct + '%';
  fill.style.background = meta.color;

  document.getElementById('progFrom').textContent = meta.from;
  document.getElementById('progTo').textContent = meta.next ? meta.progTo : '最高ランク到達';
  document.getElementById('heroNext').textContent = meta.next ? `あと ${meta.next - p.pt}pt` : 'MAX';

  drawBadgeSvg(document.getElementById('heroBadgeSvg'), rank, 60);
}

// ── RENDER: HOME / MISSIONS ───────────────────────────

function renderHome() {
  const p = currentPlayer();
  const rank = ptToRank(p.pt);
  const rankIdx = RANKS.indexOf(rank);
  const container = document.getElementById('screen-home');

  const cats = ['初級','中級','上級','FPV','HANGAR杯'];
  const catRankMin = { '初級':'beginner','中級':'middle','上級':'advanced','FPV':'advanced','HANGAR杯':'expert' };
  const catColor = { '初級':'#00e5b0','中級':'#4da6ff','上級':'#ffb830','FPV':'#ff6eb0','HANGAR杯':'#ff6eb0' };

  let html = '';

  for (const cat of cats) {
    const items = MISSIONS.filter(m => m.category === cat);
    if (!items.length) continue;

    const catRankIdx = RANKS.indexOf(catRankMin[cat]);
    const isUnlocked = rankIdx >= catRankIdx;
    const col = catColor[cat];

    html += `<div class="rank-divider">
      <div class="rank-divider-line"></div>
      <div class="rank-divider-label" style="color:${col}">${cat}</div>
      <div class="rank-divider-line"></div>
    </div>`;

    items.forEach((m, i) => {
      const cleared = p.clearedIds.includes(m.id);
      const available = isUnlocked;
      const cls = cleared ? 'cleared' : (available ? 'available' : 'locked');
      const delay = i * 0.05;

      html += `<div class="mission-item ${cls}" style="animation-delay:${delay}s">
        <div class="mission-icon-wrap" style="background:${m.color}20">
          ${missionIconSvg(m.icon, m.color)}
        </div>
        <div class="mission-body">
          <div class="mission-name">${m.name}</div>
          <div class="mission-desc">${m.desc}</div>
        </div>
        <div class="mission-right">
          <div class="mission-pt">+${m.pt}pt</div>
          ${cleared
            ? `<div class="mission-status-done">✓ クリア済</div>`
            : available
              ? `<div style="font-size:10px;color:var(--muted)">未クリア</div>`
              : `<div class="mission-lock-pill">🔒 ${catRankMin[cat]}以上</div>`}
        </div>
      </div>`;
    });
  }

  container.innerHTML = `<div class="sec-label">ミッション一覧</div><div class="missions">${html}</div>`;
}

// ── RENDER: BADGES ────────────────────────────────────

function renderBadge() {
  const p = currentPlayer();
  const rank = ptToRank(p.pt);
  const rankIdx = RANKS.indexOf(rank);

  let html = '<div class="badge-grid">';
  BADGES.forEach(b => {
    let unlocked = false;
    if (typeof b.unlock === 'function') {
      unlocked = b.unlock(p);
    } else if (b.unlock === 'never') {
      unlocked = false;
    } else {
      unlocked = RANKS.indexOf(rank) >= RANKS.indexOf(b.unlock);
    }
    const lockedCls = unlocked ? '' : ' locked';
    html += `<div class="badge-cell${lockedCls}">
      <svg viewBox="0 0 58 58" id="badge-${b.id}"></svg>
      <div class="badge-cell-name">${b.name}</div>
    </div>`;
  });
  html += '</div>';

  document.getElementById('screen-badge').innerHTML = `<div class="sec-label">パイロットバッジ</div>${html}`;

  BADGES.forEach(b => {
    const el = document.getElementById('badge-' + b.id);
    if (el) drawBadgeSvg(el, b.rank, 58);
  });
}

// ── RENDER: RANKING ───────────────────────────────────

        <div class="event-desc">パノラマ撮影部門 — いちばん綺麗な空撮を競う。締切：2025年4月30日</div>
      </div>
    </div>
    <div class="event-card">
      <div class="event-head">
        <div class="event-title">第2回 HANGAR杯</div>
        <span class="event-pill pill-close">終了</span>
      </div>
      <div class="event-body">
        <div class="event-desc">FPVタイムアタック 月間最速タイム競技</div>
        <div class="podium-wrap">
          <div class="podium-col">
            <div class="podium-pname">りなこ</div>
            <div class="podium-bar" style="height:44px;background:#1a2a4080;color:#4da6ff;border:1px solid #4da6ff40">2位</div>
          </div>
          <div class="podium-col">
            <div class="podium-pname">よしき</div>
            <div class="podium-bar" style="height:62px;background:#ffb83020;color:#ffb830;border:1px solid #ffb83060">1位</div>
          </div>
          <div class="podium-col">
            <div class="podium-pname">だいき</div>

// ── RENDER: SHOP ──────────────────────────────────────

function renderShop() {
  const p = currentPlayer();
  let html = `<div class="sec-label">プレゼントショップ</div>
    <div class="shop-header-bar">
      <span style="font-size:12px;color:var(--muted)">ポイントと交換できます</span>
      <span class="my-pt-disp" id="shopPtDisp">${p.pt}pt 保有</span>
    </div>
    <div class="shop-grid">`;

  SHOP_ITEMS.forEach(item => {
    const canBuy = p.pt >= item.cost;
    html += `<div class="shop-card">
      <div class="shop-art" style="background:${item.color}">
        ${shopArtSvg(item.artType, item.color, item.stroke)}
      </div>
      <div class="shop-body">
        <div class="shop-name">${item.name}</div>
        <div class="shop-cost">${item.cost}pt</div>
        <button class="shop-btn" ${canBuy ? '' : 'disabled'}
          onclick="redeemItem('${item.id}',${item.cost},'${item.name}')">
          ${canBuy ? '交換する' : item.cost + 'pt 必要'}
        </button>
      </div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('screen-shop').innerHTML = html;
}

// ── INTERACTIONS ──────────────────────────────────────

function switchPlayer(idx) {
  currentPlayerIdx = idx;
  document.querySelectorAll('.player-tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  renderHero();
  const active = document.querySelector('.screen.active');
  const id = active ? active.id.replace('screen-','') : 'home';
  renderScreen(id);
}

function switchTab(name) {
  ['home','badge','rank','shop'].forEach(n => {
    document.getElementById('screen-' + n).classList.toggle('active', n === name);
    document.getElementById('nb-' + n).classList.toggle('active', n === name);
  });
  renderScreen(name);
}

function renderScreen(name) {
  if (name === 'home')  renderHome();
  if (name === 'badge') renderBadge();
  if (name === 'rank')  renderRank();
  if (name === 'shop')  renderShop();
}

function redeemItem(id, cost, name) {
  const p = currentPlayer();
  if (p.pt < cost) return;
  p.pt -= cost;
  showToast(`${name} と交換しました`);
  renderHero();
  renderShop();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────

function init() {
  const tabs = document.getElementById('playerTabs');
  PLAYERS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'player-tab' + (i === 0 ? ' active' : '');
    btn.textContent = p.name;
    btn.onclick = () => switchPlayer(i);
    tabs.appendChild(btn);
  });

  renderHero();
  renderHome();
}

init();
</script>
