<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE HANGAR — Drone Wonderland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
:root {
  --bg:#07080f; --bg2:#0d0f1c; --bg3:#151828; --surface:#1a1e35;
  --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22);
  --text:#f0f2fa; --sub:#b8bdd8; --muted:#8890b0;
  --teal:#00e5b0; --teal-dim:rgba(0,229,176,.14);
  --blue:#4da6ff; --blue-dim:rgba(77,166,255,.14);
  --amber:#ffb830; --amber-dim:rgba(255,184,48,.14);
  --pink:#ff6eb0; --pink-dim:rgba(255,110,176,.14);
  --purple:#b07aff; --purple-dim:rgba(176,122,255,.14);
  --green:#4cde80; --red:#ff5f5f;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --font-head:'Orbitron',monospace; --font-body:'Noto Sans JP',sans-serif;
  --maxw:430px; --navh:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.55;min-height:100dvh;-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(26,31,64,.5) 0%,var(--bg) 70%)}
#app{width:100%;max-width:var(--maxw);min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}

/* HEADER */
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px 8px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--teal);text-shadow:0 0 18px var(--teal)}
.player-tabs{display:flex;gap:6px;align-items:center}
.player-tab{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--sub);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap}
.player-tab.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.player-tab-add{width:30px;height:30px;border-radius:50%;border:1px dashed var(--border2);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.player-tab-add:hover{border-color:var(--teal);color:var(--teal)}

/* HERO */
#hero{background:var(--bg2);padding:14px 16px 16px;border-bottom:1px solid var(--border)}
.hero-inner{display:flex;gap:14px;align-items:center;margin-bottom:12px}
.badge-area{flex-shrink:0;width:60px;height:60px}
.badge-area svg{width:60px;height:60px}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:5px}
.rank-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font-head);letter-spacing:.05em}
.rank-badge.beginner{background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal)}
.rank-badge.middle{background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue)}
.rank-badge.advanced{background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber)}
.rank-badge.expert{background:var(--pink-dim);border:1px solid var(--pink);color:var(--pink)}

/* ポイント表示（2列） */
.pt-row{display:flex;gap:12px;margin-top:6px}
.pt-block{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px}
.pt-block-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.pt-block-val{font-family:var(--font-head);font-size:20px;font-weight:700;line-height:1}
.pt-block-val.amber{color:var(--amber)}
.pt-block-val.teal{color:var(--teal)}
.pt-block-unit{font-size:11px;color:var(--muted);margin-left:3px}

/* 訓練ランク進捗バー */
.progress-wrap{margin-top:10px}
.progress-track{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}

/* MAIN */
#main{flex:1;overflow-y:auto;padding-bottom:var(--navh);scroll-behavior:smooth}
.screen{display:none}
.screen.active{display:block}
.sec-label{font-family:var(--font-head);font-size:11px;letter-spacing:.12em;color:var(--muted);padding:14px 16px 6px}

/* MISSIONS */
.missions{padding:0 12px 8px}
.mission-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:13px;margin-bottom:9px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s;animation:slideUp .25s ease both}
.mission-item:hover{border-color:var(--border2)}
.mission-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.mission-item.cleared::before{background:var(--teal)}
.mission-item.available::before{background:var(--blue)}
.mission-item.locked{opacity:.45}
.mission-item.locked::before{background:var(--muted)}
.mission-icon-wrap{width:42px;height:42px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mission-body{flex:1;min-width:0}
.mission-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission-desc{font-size:12px;color:var(--sub);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission-right{text-align:right;flex-shrink:0;min-width:52px}
.mission-pt{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--amber)}
.mission-tp{font-size:11px;color:var(--teal);margin-top:2px}
.mission-status-done{font-size:11px;color:var(--teal);margin-top:2px;font-weight:600}
.mission-lock-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--sub);border:1px solid var(--border)}
.rank-divider{display:flex;align-items:center;gap:8px;padding:10px 12px 5px}
.rank-divider-line{flex:1;height:1px;background:var(--border)}
.rank-divider-label{font-size:11px;font-family:var(--font-head);letter-spacing:.08em;font-weight:600}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;padding:8px 14px 16px}
.badge-cell{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.badge-cell svg{width:60px;height:60px;transition:transform .2s}
.badge-cell:hover svg{transform:scale(1.08)}
.badge-cell.locked{opacity:.22}
.badge-cell-name{font-size:11px;color:var(--sub);text-align:center;font-weight:500}

/* RANKING */
.rank-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)}
.rank-row.me{background:rgba(77,166,255,.07)}
.rank-pos{width:26px;font-family:var(--font-head);font-size:14px;font-weight:600;text-align:center;flex-shrink:0}
.pos-1{color:var(--amber);text-shadow:0 0 10px var(--amber)}
.pos-2{color:#c0c0c0}
.pos-3{color:#cd7f32}
.rank-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-name-col{flex:1}
.rank-name{font-size:14px;font-weight:600;color:var(--text)}
.rank-level{font-size:11px;color:var(--sub);margin-top:2px}
.rank-pt-col{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--amber);white-space:nowrap}

/* SHOP */
.shop-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:0 12px 16px}
.shop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;transition:border-color .15s}
.shop-card:hover{border-color:var(--border2)}
.shop-art{height:80px;display:flex;align-items:center;justify-content:center}
.shop-body{padding:9px 11px 12px}
.shop-name{font-size:13px;font-weight:700;color:var(--text)}
.shop-cost{font-family:var(--font-head);font-size:13px;color:var(--amber);margin-top:3px}
.shop-stock{font-size:11px;color:var(--sub);margin-top:2px}
.shop-btn{margin-top:9px;width:100%;padding:8px;font-size:12px;font-family:var(--font-body);border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all .15s;font-weight:600}
.shop-btn:hover:not(:disabled){background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.shop-btn:disabled{opacity:.35;cursor:not-allowed}

/* NAV */
#nav{position:fixed;bottom:0;width:100%;max-width:var(--maxw);height:var(--navh);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);font-size:11px;font-family:var(--font-body);cursor:pointer;transition:color .15s;padding-bottom:6px}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--teal)}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--navh)+14px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--teal);color:var(--teal);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;white-space:nowrap;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{border-color:var(--red);color:var(--red)}

/* MISSION CLEAR CELEBRATION */
#clearCelebration{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
#clearCelebration.show{opacity:1;pointer-events:auto}
.clear-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.clear-card{position:relative;background:var(--bg2);border-radius:var(--r-lg);padding:32px 28px 28px;width:88%;max-width:360px;text-align:center;border:1px solid var(--border);box-shadow:0 0 60px rgba(0,229,176,.25);animation:celebPop .4s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes celebPop{from{transform:scale(.7) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.clear-icon{font-size:56px;margin-bottom:8px;animation:celebBounce .6s ease .2s both}
@keyframes celebBounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.clear-title{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--teal);letter-spacing:.1em;margin-bottom:6px;text-shadow:0 0 20px rgba(0,229,176,.5)}
.clear-mission-name{font-size:14px;color:var(--sub);margin-bottom:20px;line-height:1.4}
.clear-rewards{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.clear-reward-item{background:var(--bg3);border-radius:var(--r-md);padding:12px 18px;border:1px solid var(--border)}
.clear-reward-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.clear-reward-val{font-family:var(--font-head);font-size:22px;font-weight:700}
.clear-reward-val.pt{color:var(--amber)}
.clear-reward-val.tp{color:var(--teal)}
.clear-close-btn{width:100%;padding:13px;background:var(--teal-dim);border:1px solid var(--teal);border-radius:var(--r-md);color:var(--teal);font-family:var(--font-head);font-size:13px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.clear-close-btn:hover{background:rgba(0,229,176,.25)}
.clear-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:var(--r-lg)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-sheet{background:var(--bg2);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:var(--maxw);padding:22px 18px 36px;border-top:1px solid var(--border)}
.modal-title{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--text);letter-spacing:.08em;margin-bottom:20px}
.modal-close{float:right;background:none;border:none;color:var(--sub);cursor:pointer;font-size:22px;line-height:1;margin-top:-4px}

/* FORMS */
.form-group{margin-bottom:18px}
.form-label{font-size:13px;color:var(--sub);margin-bottom:7px;display:block;font-weight:500}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);padding:12px 14px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--teal)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);padding:12px 14px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--teal)}
.btn-primary{width:100%;padding:14px;background:var(--teal-dim);border:1px solid var(--teal);border-radius:var(--r-sm);color:var(--teal);font-family:var(--font-head);font-size:13px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:rgba(0,229,176,.25)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:18px}
#loading.hidden{display:none}
.loading-logo{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--teal);text-shadow:0 0 24px var(--teal);letter-spacing:.2em}
.loading-spinner{width:34px;height:34px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
.loading-msg{font-size:13px;color:var(--sub)}
@keyframes spin{to{transform:rotate(360deg)}}

/* SETUP */
#screen-setup{padding:22px 18px}
.setup-title{font-family:var(--font-head);font-size:15px;color:var(--teal);margin-bottom:8px;letter-spacing:.08em}
.setup-desc{font-size:13px;color:var(--sub);margin-bottom:22px;line-height:1.75}
.player-list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.player-list-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal-dim);border:1px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--teal);flex-shrink:0}
.player-list-info{flex:1}
.player-list-name{font-size:15px;font-weight:700;color:var(--text)}
.player-list-sub{font-size:12px;color:var(--sub);margin-top:2px}
.player-edit-btn{background:none;border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--sub);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .15s;font-weight:500}
.player-edit-btn:hover{border-color:var(--teal);color:var(--teal)}
.add-player-btn{width:100%;padding:13px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r-md);color:var(--sub);font-size:14px;cursor:pointer;transition:all .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.add-player-btn:hover{border-color:var(--teal);color:var(--teal)}
.setup-start-btn{width:100%;padding:15px;background:var(--teal-dim);border:1px solid var(--teal);border-radius:var(--r-md);color:var(--teal);font-family:var(--font-head);font-size:14px;font-weight:600;letter-spacing:.08em;cursor:pointer;margin-top:22px;transition:all .15s}
.setup-start-btn:hover{background:rgba(0,229,176,.25)}
.setup-start-btn:disabled{opacity:.4;cursor:not-allowed}

/* ANIMATIONS */
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glow-pulse{0%,100%{text-shadow:0 0 20px var(--amber)}50%{text-shadow:0 0 35px var(--amber)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* MISSION DETAIL MODAL */
.mission-detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.mission-detail-overlay.hidden{display:none}
.mission-detail-sheet{background:var(--bg2);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:var(--maxw);max-height:88dvh;overflow-y:auto;border-top:1px solid var(--border);animation:slideUp .25s ease}
.mission-detail-img{width:100%;max-height:320px;object-fit:contain;display:block;background:var(--bg3)}
.mission-detail-img-placeholder{height:120px;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
.mission-detail-body{padding:20px 18px 36px}
.mission-detail-cat{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-family:var(--font-head);letter-spacing:.06em;margin-bottom:11px;font-weight:600}
.mission-detail-name{font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.35}
.mission-detail-desc{font-size:14px;color:var(--sub);line-height:1.8;margin-bottom:18px;white-space:pre-line}
.mission-detail-meta{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.mission-detail-meta-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 13px;flex:1;min-width:80px}
.mission-detail-meta-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.mission-detail-meta-value{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--text)}
.mission-detail-close{position:absolute;top:14px;right:14px;background:var(--bg3);border:1px solid var(--border);color:var(--sub);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.mission-detail-header{position:relative}
.mission-detail-action-btn{width:100%;padding:15px;border-radius:var(--r-md);font-family:var(--font-head);font-size:14px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .15s;border:1px solid}
.mission-detail-action-btn.auto{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.mission-detail-action-btn.auto:hover{background:rgba(0,229,176,.25)}
.mission-detail-action-btn.qr{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.mission-detail-action-btn.qr:hover{background:rgba(77,166,255,.25)}
.mission-detail-action-btn.staff{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.mission-detail-action-btn.staff:hover{background:rgba(255,184,48,.25)}
.mission-detail-cleared{width:100%;padding:15px;border-radius:var(--r-md);background:rgba(0,229,176,.08);border:1px solid var(--teal);color:var(--teal);font-family:var(--font-head);font-size:14px;font-weight:600;text-align:center}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">THE HANGAR</div>
  <div class="loading-spinner"></div>
  <div class="loading-msg" id="loadingMsg">起動中...</div>
</div>

<div id="app">
  <div id="header">
    <div class="header-top">
      <div class="logo">THE HANGAR</div>
      <div class="player-tabs" id="playerTabs"></div>
    </div>
  </div>

  <div id="hero">
    <div class="hero-inner">
      <div class="badge-area"><svg id="heroBadgeSvg" viewBox="0 0 60 60"></svg></div>
      <div class="hero-info">
        <div class="hero-name" id="heroName">—</div>
        <div><span class="rank-badge" id="heroRankBadge"></span></div>
      </div>
    </div>
    <div class="pt-row">
      <div class="pt-block">
        <div class="pt-block-label">ポイント</div>
        <div><span class="pt-block-val amber" id="heroPt">0</span><span class="pt-block-unit">pt</span></div>
      </div>
      <div class="pt-block">
        <div class="pt-block-label">訓練ポイント</div>
        <div><span class="pt-block-val teal" id="heroTp">0</span><span class="pt-block-unit">tp</span></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-labels"><span id="progFrom"></span><span id="progTo"></span></div>
    </div>
  </div>

  <div id="main">

<!-- プレイヤー登録/編集モーダル -->
<div class="modal-overlay hidden" id="playerModal">

<div id="toast"></div>

<!-- ミッションクリア演出 -->
<div id="clearCelebration">
  <div class="clear-backdrop" onclick="closeClearCelebration()"></div>
  <div class="clear-card">
    <div class="clear-particles" id="clearParticles"></div>

    <button class="clear-close-btn" onclick="closeClearCelebration()">つぎのミッションへ</button>
  </div>

<script>
// ── API設定 ───────────────────────────────────────────
const API_POST = 'https://prod-12.japaneast.logic.azure.com:443/workflows/aabd58e5133445fd919f56fda0874fd2/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=XQnrcVDi61hN8nBqhcTvSAgUFXgu4ThCY1PVFX8Al4c';
const API_GET  = 'https://prod-16.japaneast.logic.azure.com:443/workflows/c52fbe515a9d46a5b799eec930242591/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=beXHqRPc12aZ20VZGM_ek0PIS6AQgW5JL7oIlRUFLds';
const LIFF_ID  = '2009832085-NoI5Q9yY';

// ── 定数 ─────────────────────────────────────────────
// ランク階層：エントリー < 初級 < 中級 < 上級 < FPV
const RANK_LEVELS = ['entry','beginner','middle','advanced','fpv'];
const RANK_META = {
  entry:    { label:'エントリーパイロット', color:'#ffffff',  threshold:0 },
  beginner: { label:'初級パイロット',       color:'#00e5b0',  threshold:0 },
  middle:   { label:'中級パイロット',       color:'#4da6ff',  threshold:0 },
  advanced: { label:'上級パイロット',       color:'#ffb830',  threshold:0 },
  fpv:      { label:'FPVパイロット',        color:'#ff6eb0',  threshold:0 },
  none:     { label:'未認定',              color:'#8890b0',  threshold:0 },
};

// バッジ定義（カテゴリ別訓練ポイント閾値）
const BADGE_DEF = {
  entry:    { cat:'エントリー', tp:50,  label:'エントリーバッジ', rankKey:'entry'    },
  beginner: { cat:'初級',       tp:100, label:'初級バッジ',       rankKey:'beginner' },
  middle:   { cat:'中級',       tp:150, label:'中級バッジ',       rankKey:'middle'   },
  advanced: { cat:'上級',       tp:200, label:'上級バッジ',       rankKey:'advanced' },
  fpv:      { cat:'FPV',        tp:200, label:'FPVバッジ',        rankKey:'fpv'      },
  event:    { cat:'イベント',   tp:150, label:'イベントバッジ',   rankKey:null       },
};

// カテゴリ設定
const CAT_COLOR   = { 'エントリー':'#ffffff','初級':'#00e5b0','中級':'#4da6ff','上級':'#ffb830','FPV':'#ff6eb0','HANGAR杯':'#ff6eb0','ポイントミッション':'#b07aff','イベント':'#4cde80' };
const CAT_RANK_MIN= { 'エントリー':null,'初級':null,'中級':null,'上級':null,'FPV':null,'HANGAR杯':null,'ポイントミッション':null,'イベント':null };
const ICON_MAP    = { 'エントリー':'entry','初級':'target','中級':'soccer','上級':'camera','FPV':'eye','HANGAR杯':'trophy','ポイントミッション':'coin','イベント':'tent' };

// ── アプリ状態 ────────────────────────────────────────
let STATE = {
  accountId: null, lineUserId: null,
  players: [], missions: [], shopItems: [],
  currentPlayerIdx: 0, editingPlayerId: null,
};

function currentPlayer() { return STATE.players[STATE.currentPlayerIdx] || null; }

// ── API ───────────────────────────────────────────────
async function apiPost(action, payload) {
  const res = await fetch(API_POST, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, payload }),
  });
  return res.json();
}
async function apiGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_GET}&${qs}`);
  return res.json();
}

// ── 起動 ─────────────────────────────────────────────
async function boot() {
  setLoading('LINE認証を確認中...');
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href }); return; }
    const profile = await liff.getProfile();
    STATE.lineUserId = profile.userId;

    setLoading('アカウントを確認中...');
    const authRes = await apiPost('auth_session', { lineUserId: STATE.lineUserId });
    if (authRes.error) throw new Error(authRes.error.message);
    STATE.accountId = authRes.accountId;

    setLoading('データを読み込み中...');
    const playersRes = await apiGet('get_players', { accountId: STATE.accountId });
    if (playersRes.error) throw new Error(playersRes.error.message);

    const clearLogs = playersRes.clearLogs || [];
    STATE.players = (playersRes.players || []).map(p => ({
      ...p,
      totalPoints:         Number(p.totalPoints || 0),
      totalTrainingPoints: Number(p.totalTrainingPoints || 0),
      clearedMissionIds: clearLogs
        .filter(l => l._cr877_playerid_value === p.playerId)
        .map(l => l._cr877_missionid_value),
    }));

    const [missionsRes, shopRes] = await Promise.all([
      apiGet('get_missions'),
      apiGet('get_shop'),
    ]);
    STATE.missions  = missionsRes.missions || [];
    STATE.shopItems = shopRes.items || [];

    // カテゴリ別訓練ポイントでランクを計算
    STATE.players.forEach(p => { p.currentLevel = calcRankFromCatTp(p); });

    hideLoading();
    if (STATE.players.length === 0) {
      showApp(); renderSetup();
      document.getElementById('header').style.display = 'none';
      document.getElementById('hero').style.display = 'none';
      document.getElementById('nav').style.display = 'none';
      document.getElementById('screen-setup').classList.add('active');
    } else {
      showApp(); initMainApp();
    }
  } catch (e) {
    hideLoading(); showToast('読み込みエラー: ' + e.message, true);
  }
}

// カテゴリ別訓練ポイント計算
function calcCatTp(p, category) {
  return p.clearedMissionIds.reduce((sum, id) => {
    const m = STATE.missions.find(x => x.missionId === id);
    return m?.category === category ? sum + Number(m.trainingPoints || 0) : sum;
  }, 0);
}

// カテゴリ別tp→ランク判定（上位から判定）
function calcRankFromCatTp(p) {
  if (calcCatTp(p, 'FPV')      >= BADGE_DEF.fpv.tp)      return 'fpv';
  if (calcCatTp(p, '上級')     >= BADGE_DEF.advanced.tp)  return 'advanced';
  if (calcCatTp(p, '中級')     >= BADGE_DEF.middle.tp)    return 'middle';
  if (calcCatTp(p, '初級')     >= BADGE_DEF.beginner.tp)  return 'beginner';
  if (calcCatTp(p, 'エントリー') >= BADGE_DEF.entry.tp)   return 'entry';
  return 'none';
}

// 他プレイヤー用：totalTrainingPoints合計から近似ランクを推定
function calcRankFromTotalTp(totalTp) {
  if (totalTp >= 200) return 'fpv';
  if (totalTp >= 150) return 'advanced';
  if (totalTp >= 100) return 'middle';
  if (totalTp >= 50)  return 'beginner';
  if (totalTp > 0)    return 'entry';
  return 'none';
}

function setLoading(msg) { document.getElementById('loadingMsg').textContent = msg; document.getElementById('loading').classList.remove('hidden'); }
function hideLoading()   { document.getElementById('loading').classList.add('hidden'); }
function showApp()       { document.getElementById('app').style.visibility = 'visible'; }

// ── セットアップ ──────────────────────────────────────
function renderSetup() {
  const container = document.getElementById('screen-setup');
  const count = STATE.players.length;
  let playersHtml = STATE.players.map(p => `
    <div class="player-list-item">
      <div class="player-list-avatar">${p.name.charAt(0)}</div>
      <div class="player-list-info">
        <div class="player-list-name">${p.name}</div>
        <div class="player-list-sub">${p.ageGroup === 'child' ? '子ども' : '大人'} / ${RANK_META[p.currentLevel]?.label || p.currentLevel}</div>
      </div>
      <button class="player-edit-btn" onclick="openEditPlayer('${p.playerId}')">編集</button>
    </div>`).join('');

  container.innerHTML = `
    <div class="setup-title">パイロット登録</div>
    <div class="setup-desc">一緒に飛ぶパイロットを登録してください。最大3名まで登録できます。</div>
    ${playersHtml}
    ${count < 3 ? `<button class="add-player-btn" onclick="openAddPlayer()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      パイロットを追加</button>` : ''}
    <button class="setup-start-btn" ${count > 0 ? '' : 'disabled'} onclick="startApp()">フライト開始</button>`;
}

function startApp() {
  document.getElementById('header').style.display = '';
  document.getElementById('hero').style.display = '';
  document.getElementById('nav').style.display = '';
  document.getElementById('screen-setup').classList.remove('active');
  initMainApp();
}

// ── プレイヤーモーダル ────────────────────────────────
function openAddPlayer() {
  STATE.editingPlayerId = null;
  document.getElementById('playerModalTitle').textContent = 'パイロット登録';
  document.getElementById('playerNameInput').value = '';
  document.getElementById('playerAgeInput').value = 'child';
  document.getElementById('playerSaveBtn').textContent = '登録する';
  document.getElementById('playerModal').classList.remove('hidden');
}
function openEditPlayer(playerId) {
  const p = STATE.players.find(x => x.playerId === playerId);
  if (!p) return;
  STATE.editingPlayerId = playerId;
  document.getElementById('playerModalTitle').textContent = 'パイロット情報を編集';
  document.getElementById('playerNameInput').value = p.name;
  document.getElementById('playerAgeInput').value = p.ageGroup;
  document.getElementById('playerSaveBtn').textContent = '更新する';
  document.getElementById('playerModal').classList.remove('hidden');
}
function closePlayerModal() { document.getElementById('playerModal').classList.add('hidden'); }

async function savePlayer() {
  const name = document.getElementById('playerNameInput').value.trim();
  const ageGroup = document.getElementById('playerAgeInput').value;
  if (!name) { showToast('名前を入力してください', true); return; }
  const btn = document.getElementById('playerSaveBtn');
  btn.disabled = true; btn.textContent = '処理中...';
  try {
    if (STATE.editingPlayerId) {
      const res = await apiPost('update_player', { playerId: STATE.editingPlayerId, name, ageGroup });
      if (res.error) throw new Error(res.error.message);
      const idx = STATE.players.findIndex(p => p.playerId === STATE.editingPlayerId);
      if (idx >= 0) { STATE.players[idx].name = name; STATE.players[idx].ageGroup = ageGroup; }
      showToast(`${name} の情報を更新しました`);
    } else {
      const res = await apiPost('create_player', { accountId: STATE.accountId, name, ageGroup, sortOrder: STATE.players.length + 1 });
      if (res.error) throw new Error(res.error.message);
      STATE.players.push({ ...res, totalPoints: 0, totalTrainingPoints: 0, clearedMissionIds: [] });
      showToast(`${name} を登録しました`);
    }
    closePlayerModal();
    if (document.getElementById('screen-setup').classList.contains('active')) { renderSetup(); }
    else { renderPlayerTabs(); renderHero(); }
  } catch (e) { showToast(e.message, true); }
  finally { btn.disabled = false; }
}

// ── メインアプリ ──────────────────────────────────────
function initMainApp() { renderPlayerTabs(); renderHero(); switchTab('home'); }

// ── プレイヤータブ ─────────────────────────────────────
let longPressTimer = null;
function startLongPress(playerId) { longPressTimer = setTimeout(() => openEditPlayer(playerId), 600); }
function cancelLongPress() { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }

function renderPlayerTabs() {
  const tabs = document.getElementById('playerTabs');
  tabs.innerHTML = STATE.players.map((p, i) =>
    `<button class="player-tab ${i === STATE.currentPlayerIdx ? 'active' : ''}"
      onclick="switchPlayer(${i})"
      oncontextmenu="event.preventDefault();openEditPlayer('${p.playerId}')"
      ontouchstart="startLongPress('${p.playerId}')"
      ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">${p.name}</button>`
  ).join('') + (STATE.players.length < 3
    ? `<button class="player-tab-add" onclick="openAddPlayer()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg></button>` : '');
}

function switchPlayer(idx) {
  STATE.currentPlayerIdx = idx;
  renderPlayerTabs(); renderHero();
  const active = document.querySelector('.screen.active');
  if (active) renderScreen(active.id.replace('screen-', ''));
}

// ── ヒーロー ──────────────────────────────────────────
function renderHero() {
  const p = currentPlayer();
  if (!p) return;
  const rank = p.currentLevel || 'none';
  const meta = RANK_META[rank] || RANK_META.none;
  document.getElementById('heroName').textContent = p.name;
  document.getElementById('heroPt').textContent = p.totalPoints;
  document.getElementById('heroTp').textContent = p.totalTrainingPoints;
  const pill = document.getElementById('heroRankBadge');
  pill.className = 'rank-badge ' + rank;
  pill.textContent = meta.label;

  // 次のランクへの進捗を表示
  const rankOrder = ['none','entry','beginner','middle','advanced','fpv'];
  const currentIdx = rankOrder.indexOf(rank);
  const nextRankKey = rankOrder[currentIdx + 1];
  const fill = document.getElementById('progFill');

  if (nextRankKey && BADGE_DEF[nextRankKey]) {
    const bd = BADGE_DEF[nextRankKey];
    const currentCatTp = calcCatTp(p, bd.cat);
    const pct = Math.min(100, Math.round(currentCatTp / bd.tp * 100));
    fill.style.width = pct + '%';
    fill.style.background = meta.color || '#00e5b0';
    document.getElementById('progFrom').textContent = meta.label;
    document.getElementById('progTo').textContent = `${bd.label}まで ${bd.tp - currentCatTp}tp`;
  } else {
    fill.style.width = '100%';
    fill.style.background = meta.color || '#ff6eb0';
    document.getElementById('progFrom').textContent = meta.label;
    document.getElementById('progTo').textContent = '最高ランク到達';
  }
  drawBadgeSvg(document.getElementById('heroBadgeSvg'), rank === 'none' ? 'entry' : rank, 60);
}

// ── タブ ─────────────────────────────────────────────
function switchTab(name) {
  ['setup','home','badge','rank','shop'].forEach(n => {
    document.getElementById('screen-'+n)?.classList.toggle('active', n === name);
    document.getElementById('nb-'+n)?.classList.toggle('active', n === name);
  });
  renderScreen(name);
}
function renderScreen(name) {
  if (name === 'home')  renderHome();
  if (name === 'badge') renderBadge();
  if (name === 'rank')  renderRank();
  if (name === 'shop')  renderShop();
}

// ── ミッションアイコン ────────────────────────────────
function missionIconSvg(type, color) {
  const icons = {
    // 初級：的当てターゲット
    target:  `<circle cx="12" cy="12" r="9" stroke="${color}" stroke-width="1.4" fill="none"/><circle cx="12" cy="12" r="5" stroke="${color}" stroke-width="1.4" fill="none"/><circle cx="12" cy="12" r="2" fill="${color}"/>`,
    // 中級：サッカーボール
    soccer:  `<circle cx="12" cy="12" r="9" stroke="${color}" stroke-width="1.4" fill="none"/>
              <path d="M12 3Q15 6 14 10L10 11Q7 9 8 5Q10 3 12 3Z" stroke="${color}" stroke-width="1" fill="${color}30"/>
              <path d="M21 10Q20 14 17 15L14 12Q15 8 19 7Q21 8 21 10Z" stroke="${color}" stroke-width="1" fill="${color}30"/>
              <path d="M17 19Q14 21 11 20L11 16Q14 14 17 16Q18 17 17 19Z" stroke="${color}" stroke-width="1" fill="${color}30"/>
              <path d="M7 20Q4 18 4 15L7 13Q10 14 11 17Q10 19 7 20Z" stroke="${color}" stroke-width="1" fill="${color}30"/>
              <path d="M3 9Q4 6 7 5L10 8Q9 12 6 12Q4 11 3 9Z" stroke="${color}" stroke-width="1" fill="${color}30"/>`,
    // 上級：カメラ
    camera:  `<rect x="3" y="7" width="18" height="13" rx="2" stroke="${color}" stroke-width="1.4" fill="none"/><circle cx="12" cy="13" r="3.5" stroke="${color}" stroke-width="1.4" fill="none"/><path d="M9 7V5h6v2" stroke="${color}" stroke-width="1.4" stroke-linejoin="round"/>`,
    // FPV：目玉アイコン
    eye:     `<path d="M3 12Q6 5 12 5Q18 5 21 12Q18 19 12 19Q6 19 3 12Z" stroke="${color}" stroke-width="1.4" fill="none"/><circle cx="12" cy="12" r="3.5" stroke="${color}" stroke-width="1.4" fill="${color}30"/><circle cx="12" cy="12" r="1.5" fill="${color}"/>`,
    // HANGAR杯：トロフィー
    trophy:  `<path d="M8 2h8v8a4 4 0 01-8 0V2z" stroke="${color}" stroke-width="1.4" fill="${color}20"/><path d="M4 4H8M20 4h-4" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/><path d="M12 14v4M8 21h8" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/>`,
    // ポイントミッション：コイン（円マーク）
    coin:    `<circle cx="12" cy="12" r="9" stroke="${color}" stroke-width="1.4" fill="${color}15"/><text x="12" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="${color}" font-family="sans-serif">¥</text>`,
    // イベント：屋台テント
    tent:    `<path d="M2 18L7 6L12 10L17 6L22 18Z" stroke="${color}" stroke-width="1.4" fill="${color}20" stroke-linejoin="round"/><path d="M2 18h20" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/><path d="M9 18v-5h6v5" stroke="${color}" stroke-width="1.4" stroke-linejoin="round"/><path d="M7 6v2M17 6v2" stroke="${color}" stroke-width="1.2" stroke-linecap="round"/>`,
  };
  return `<svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px">${icons[type] || icons.target}</svg>`;
}

// ── ホーム ────────────────────────────────────────────
function isEventVisible(m) {
  if (m.category !== 'イベント') return true;
  if (!m.isEvent) return false;
  const now = new Date();
  const start = m.eventStart ? new Date(m.eventStart) : null;
  const end   = m.eventEnd   ? new Date(m.eventEnd)   : null;
  if (start && now < start) return false;
  if (end   && now > end)   return false;
  return true;
}

// ── ミッションのロック判定 ─────────────────────────────
function getMissionLockStatus(m, p) {
  const rankIdx = RANKS.indexOf(p.currentLevel);
  const cat     = m.category;
  // ランクは個別ミッションのrequiredRankを使う
  const reqRank = m.requiredRank;
  const rankOk  = !reqRank || rankIdx >= RANKS.indexOf(reqRank);
  // sortOrderがnullの場合は制限なし扱い
  const sortNo  = (m.sortOrder !== null && m.sortOrder !== undefined) ? Number(m.sortOrder) : null;

  // エントリー：常に開放
  if (cat === 'エントリー') return { unlocked: true, lockReason: null };

  // イベント：期間内+isEvent+ランク
  if (cat === 'イベント') {
    if (!rankOk) return { unlocked: false, lockReason: `rank:${reqRank}` };
    return { unlocked: true, lockReason: null };
  }

  // ポイントミッション・HANGAR杯：ランクのみ
  if (cat === 'ポイントミッション' || cat === 'HANGAR杯') {
    if (!rankOk) return { unlocked: false, lockReason: `rank:${reqRank}` };
    return { unlocked: true, lockReason: null };
  }

  // 初級・中級・上級・FPV
  if (['初級','中級','上級','FPV'].includes(cat)) {
    // ランクチェック（個別ミッションのrequiredRank）
    if (!rankOk) return { unlocked: false, lockReason: `rank:${reqRank}` };
    // sortOrder=nullは制限なし
    if (sortNo === null) return { unlocked: true, lockReason: null };
    // No1：requiredRankのみで開放（エントリー不要）
    if (sortNo === 1) return { unlocked: true, lockReason: null };
    // No2以降：同カテゴリのsortOrder=1クリア済みが必要
    const catNo1 = STATE.missions.find(
      x => x.category === cat && x.sortOrder !== null && Number(x.sortOrder) === 1
    );
    if (catNo1 && !p.clearedMissionIds.includes(catNo1.missionId)) {
      return { unlocked: false, lockReason: `cat1:${cat}` };
    }
    return { unlocked: true, lockReason: null };
  }

  return { unlocked: true, lockReason: null };
}

function lockLabel(lockReason) {
  if (!lockReason) return '';
  if (lockReason.startsWith('rank:')) return `🔒 ${RANK_META[lockReason.split(':')[1]]?.label || ''}〜`;
  if (lockReason === 'entry') return '🔒 エントリー完了後';
  if (lockReason.startsWith('cat1:')) return `🔒 ${lockReason.split(':')[1]}No.1クリア後`;
  return '🔒';
}

function renderHome() {

  if (!p) return;

  const jumpCats = ['中級','上級','FPV','HANGAR杯','ポイントミッション','イベント'].filter(cat =>
    STATE.missions.some(m => m.category === cat && isEventVisible(m))
  );

    <div style="display:flex;gap:8px;overflow-x:auto;padding:8px 12px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch">

    const col  = CAT_COLOR[cat] || '#7a82a8';

      <div class="rank-divider-label" style="color:${col}">${cat}</div>

    </div>`;

    const sorted = [...items].sort((a, b) => {
      const sa = a.sortOrder !== null ? Number(a.sortOrder) : 999;
      const sb = b.sortOrder !== null ? Number(b.sortOrder) : 999;
      return sa - sb;
    });

    sorted.forEach((m, i) => {
      const cleared = p.clearedMissionIds.includes(m.missionId);
      const { unlocked, lockReason } = getMissionLockStatus(m, p);

      const tpLabel = tp > 0 ? `<div class="mission-tp">+${tp}tp</div>` : '';

          <div class="mission-desc">${m.description || ''}</div>
        </div>

          <div class="mission-pt">+${m.points}pt</div>

            ? `<div class="mission-status-done">✓ クリア済</div>`
            : unlocked
              ? `<div style="font-size:11px;color:var(--blue)">▶ 詳細</div>`
              : `<div class="mission-lock-pill">${lockLabel(lockReason)}</div>`}
        </div>
      </div>`;
    });
  }
  document.getElementById('screen-home').innerHTML =
    `<div class="sec-label">ミッション一覧</div><div class="missions">${html}</div>`;
}

// ── ミッションクリア ──────────────────────────────────
async function clearMission(missionId, playerId, evidenceType, evidenceData) {
  try {
    const m = STATE.missions.find(x => x.missionId === missionId);
    const res = await apiPost('mission_clear', {
      playerId, missionId, accountId: STATE.accountId,
      clearMethod: m?.clearMethod || 'auto',
      evidenceType, evidenceData, clearedAt: new Date().toISOString(),
    });
    if (res.error) throw new Error(res.error.message);
    const p = STATE.players.find(x => x.playerId === playerId);
    if (p && res.status === 'cleared') {
      p.clearedMissionIds.push(missionId);
      p.totalPoints         = Number(p.totalPoints)         + Number(res.pointsEarned         || 0);
      p.totalTrainingPoints = Number(p.totalTrainingPoints) + Number(res.trainingPointsEarned || 0);
      p.currentLevel = calcRankFromCatTp(p);
    }
    renderHero(); renderHome();
    const tp = Number(res.trainingPointsEarned || 0);
    if (res.status === 'pending') {
      showToast('申請完了！スタッフの確認後にポイントが付与されます');
    } else {
      showClearCelebration(m, Number(res.pointsEarned || 0), tp);
    }
  } catch (e) { showToast(e.message, true); }
}
async function clearMissionAuto(missionId, playerId)  { await clearMission(missionId, playerId, '185220001', ''); }
async function clearMissionStaff(missionId, playerId) { await clearMission(missionId, playerId, '185220003', ''); }

// ── QRスキャン ────────────────────────────────────────
let qrScanState = { missionId:null, playerId:null, expectedCode:null, stream:null, timer:null };
function openQrScan(missionId, playerId, expectedCode) {
  qrScanState = { missionId, playerId, expectedCode, stream:null, timer:null };
  document.getElementById('qrModal').classList.remove('hidden');
  document.getElementById('qrStatus').textContent = 'カメラを起動中...';
  startQrCamera();
}
function closeQrModal() { stopQrCamera(); document.getElementById('qrModal').classList.add('hidden'); }
async function startQrCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
    qrScanState.stream = stream;
    const v = document.getElementById('qrVideo');
    v.srcObject = stream; v.play();
    document.getElementById('qrStatus').textContent = 'QRコードをカメラに向けてください';
    qrScanState.timer = setInterval(scanQrFrame, 300);
  } catch (e) { document.getElementById('qrStatus').textContent = 'カメラを起動できませんでした'; }
}
function stopQrCamera() {
  if (qrScanState.timer)  { clearInterval(qrScanState.timer); qrScanState.timer = null; }
  if (qrScanState.stream) { qrScanState.stream.getTracks().forEach(t => t.stop()); qrScanState.stream = null; }
}
function scanQrFrame() {
  const v = document.getElementById('qrVideo');
  if (v.readyState !== v.HAVE_ENOUGH_DATA) return;
  const c = document.getElementById('qrCanvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  const code = jsQR(c.getContext('2d').getImageData(0, 0, c.width, c.height).data, c.width, c.height);
  if (code) {
    if (code.data === qrScanState.expectedCode) {
      stopQrCamera();
      document.getElementById('qrModal').classList.add('hidden');
      clearMission(qrScanState.missionId, qrScanState.playerId, '185220002', code.data);
    } else {
      document.getElementById('qrStatus').textContent = 'QRコードが一致しません';
    }
  }
}

  entry:    { bg:'#ffffff20',stroke:'#ffffff',fill:'#ffffff',label:'E',  fc:'#222222' },

  middle:   { bg:'#4da6ff20',stroke:'#4da6ff',fill:'#4da6ff',label:'中', fc:'#0a3060' },
  advanced: { bg:'#ffb83020',stroke:'#ffb830',fill:'#ffb830',label:'上', fc:'#5a3a00' },
  fpv:      { bg:'#ff6eb020',stroke:'#ff6eb0',fill:'#ff6eb0',label:'FPV',fc:'#5a1030' },

  hangar:   { bg:'#7a7f9a20',stroke:'#7a7f9a',fill:'#7a7f9a',label:'H',  fc:'#2a2a3a' },
};

function drawBadgeSvg(svgEl, rankKey, size) {
  const s = size || 60, h = s/2;
  const c = BADGE_CFG[rankKey] || BADGE_CFG.beginner;
  const pts = 6, ro = h-3, ri = ro*0.7;
  let star = '';
  for (let i = 0; i < pts*2; i++) {
    const ang = (i*Math.PI/pts) - Math.PI/2;
    const r = i%2===0 ? ro : ri;
    star += (i===0?'M':'L') + (h+r*Math.cos(ang)).toFixed(2) + ',' + (h+r*Math.sin(ang)).toFixed(2);
  }
  star += 'Z';
  const fs = ['fpv','mission10','event'].includes(rankKey) ? Math.floor(s*.15) : Math.floor(s*.2);
  svgEl.setAttribute('viewBox', `0 0 ${s} ${s}`);
  svgEl.innerHTML = `<path d="${star}" fill="${c.bg}" stroke="${c.stroke}" stroke-width="1.6"/>
    <circle cx="${h}" cy="${h}" r="${h*.38}" fill="${c.fill}" opacity="0.25"/>
    <circle cx="${h}" cy="${h}" r="${h*.28}" fill="${c.fill}" opacity="0.5"/>
    <text x="${h}" y="${h}" text-anchor="middle" dominant-baseline="central"
      font-size="${fs}" font-weight="700" fill="${c.fc}" font-family="'Orbitron',monospace">${c.label}</text>`;
}

      ? `<div style="font-size:12px;color:var(--sub)">特別バッジです</div>`
      : `<div style="font-size:12px;color:var(--sub)">条件未公開</div>`;
    return;
  }

  const unit = prog.unit || 'tp';
  const pct = Math.min(100, Math.round(prog.cur / prog.max * 100));
  const col = BADGE_CFG[b.rank]?.stroke || 'var(--teal)';
  const remaining = prog.max - prog.cur;

  progEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px">
      <span>${b.cat ? b.cat + 'カテゴリ訓練ポイント' : 'クリアミッション数'}</span>
      <span style="color:${col};font-weight:700">${prog.cur} / ${prog.max}${unit}</span>
    </div>
    <div class="progress-track" style="height:8px">
      <div class="progress-fill" style="width:${pct}%;background:${col}"></div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px;text-align:right">
      ${unlocked ? '達成！' : `あと ${remaining}${unit}`}
    </div>`;
}

// ── ランキング ────────────────────────────────────────
async function renderRank() {
  const p = currentPlayer();
  if (!p) return;

  document.getElementById('screen-rank').innerHTML =
    `<div class="sec-label">今月の総合ランキング</div>
     <div style="padding:40px 16px;text-align:center">
       <div class="loading-spinner" style="margin:0 auto 12px"></div>
       <div style="font-size:13px;color:var(--muted)">読み込み中...</div>
     </div>`;

  try {
    const res = await apiGet('get_ranking');
    if (res.error) throw new Error(res.error.message);

    const players = res.players || [];
    const myPlayerIds = STATE.players.map(x => x.playerId);

    const posClass = ['pos-1','pos-2','pos-3'];
    const avatarColors = [
      {bg:'#FAEEDA',tc:'#633806'},{bg:'#1a2a40',tc:'#4da6ff'},
      {bg:'#2a1a20',tc:'#ff6eb0'},{bg:'#1a2040',tc:'#7a7f9a'},
      {bg:'#0a1f3a',tc:'#4da6ff'},{bg:'#2a1a10',tc:'#ffb830'},
    ];

    let html = players.map((r, i) => {
      const isMe = myPlayerIds.includes(r.playerId);
      const ac = avatarColors[i % avatarColors.length];
      // 自分のプレイヤーはSTATEから正確なランクを取得、他は訓練ポイント合計から近似
      const myPlayer = STATE.players.find(x => x.playerId === r.playerId);
      const rankKey = myPlayer
        ? calcRankFromCatTp(myPlayer)
        : calcRankFromTotalTp(Number(r.totalTrainingPoints || 0));
      const rankLabel = RANK_META[rankKey]?.label || '未認定';
      const lifetimePt = Number(r.totalLifetimePoints || 0);
      return `<div class="rank-row${isMe ? ' me' : ''}">
        <div class="rank-pos ${posClass[i] || ''}">${i + 1}</div>
        <div class="rank-avatar" style="background:${ac.bg};color:${ac.tc}">${r.name.charAt(0)}</div>
        <div class="rank-name-col">
          <div class="rank-name">${r.name}${isMe ? ' 👤' : ''}</div>
          <div class="rank-level">${rankLabel}</div>
        </div>
        <div class="rank-pt-col">${lifetimePt}pt</div>
      </div>`;
    }).join('');

    if (!players.length) {
      html = `<div style="padding:40px 16px;text-align:center;font-size:13px;color:var(--muted)">まだランキングデータがありません</div>`;
    }

    document.getElementById('screen-rank').innerHTML =
      `<div class="sec-label">総合ランキング（生涯獲得ポイント順）</div><div>${html}</div>`;

  } catch (e) {
    document.getElementById('screen-rank').innerHTML =
      `<div style="padding:40px 16px;text-align:center;font-size:13px;color:var(--red)">読み込みエラー: ${e.message}</div>`;
  }
}

// ── ショップ ──────────────────────────────────────────
function shopArtSvg(type, color, stroke) {
  const arts = {
    drink:  `<svg viewBox="0 0 52 52" fill="none" style="width:52px;height:52px"><rect x="16" y="14" width="20" height="26" rx="4" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><path d="M19 14V10a3 3 0 016 0" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round"/></svg>`,
    sticker:`<svg viewBox="0 0 52 52" fill="none" style="width:52px;height:52px"><polygon points="26,8 30,18 42,18 33,25 36,36 26,29 16,36 19,25 10,18 22,18" fill="${color}" stroke="${stroke}" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
    drone:  `<svg viewBox="0 0 52 52" fill="none" style="width:52px;height:52px"><rect x="18" y="22" width="16" height="10" rx="3" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="14" cy="20" r="4" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="38" cy="20" r="4" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="14" cy="34" r="4" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="38" cy="34" r="4" fill="${color}" stroke="${stroke}" stroke-width="1.2"/></svg>`,
    tshirt: `<svg viewBox="0 0 52 52" fill="none" style="width:52px;height:52px"><path d="M16 14h20l4 8-5 2v14H17V24l-5-2 4-8z" fill="${color}" stroke="${stroke}" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
    drone2: `<svg viewBox="0 0 52 52" fill="none" style="width:52px;height:52px"><rect x="17" y="21" width="18" height="12" rx="3" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="13" cy="19" r="5" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="39" cy="19" r="5" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="13" cy="35" r="5" fill="${color}" stroke="${stroke}" stroke-width="1.2"/><circle cx="39" cy="35" r="5" fill="${color}" stroke="${stroke}" stroke-width="1.2"/></svg>`,
    hoodie: `<svg viewBox="0 0 52 52" fill="none" style="width:52px;height:52px"><path d="M18 14l-6 8 5 2v14h18V24l5-2-6-8c-2 3-4 4-8 4s-6-1-8-4z" fill="${color}" stroke="${stroke}" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
  };
  return (arts[type] || arts.drone);
}
const ART_COLORS = {
  drink:  ['#E1F5EE','#1D9E75'], sticker:['#E6F1FB','#4da6ff'],
  drone:  ['#FAEEDA','#ffb830'], tshirt: ['#FBEAF0','#ff6eb0'],
  drone2: ['#FAEEDA','#ffb830'], hoodie: ['#FBEAF0','#ff6eb0'],
};

function renderShop() {
  const p = currentPlayer();
  if (!p) return;
  let html = `<div class="sec-label">プレゼントショップ</div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px">
      <span style="font-size:13px;color:var(--sub)">ポイントと交換できます</span>
      <span style="font-family:var(--font-head);font-size:15px;color:var(--amber);font-weight:700">${p.totalPoints}<span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:3px">pt 保有</span></span>
    </div>
    <div class="shop-grid">`;
  STATE.shopItems.forEach(item => {
    const canBuy = p.totalPoints >= item.requiredPoints && (item.stock === null || item.stock > 0);
    const outOfStock = item.stock !== null && item.stock === 0;
    const [bg, stroke] = ART_COLORS[item.artType] || ART_COLORS.drone;
    html += `<div class="shop-card">
      <div class="shop-art" style="background:${bg}20">${shopArtSvg(item.artType, bg, stroke)}</div>
      <div class="shop-body">
        <div class="shop-name">${item.name}</div>
        <div class="shop-cost">${item.requiredPoints}pt</div>
        ${item.stock !== null ? `<div class="shop-stock">残り${item.stock}個</div>` : ''}
        <button class="shop-btn" ${canBuy ? '' : 'disabled'} onclick="redeemItem('${item.itemId}',${item.requiredPoints},'${item.name}')">
          ${outOfStock ? '在庫なし' : canBuy ? '交換する' : item.requiredPoints + 'pt 必要'}
        </button>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('screen-shop').innerHTML = html;
}

async function redeemItem(itemId, cost, name) {
  const p = currentPlayer();
  if (!p || p.totalPoints < cost) return;
  try {
    const res = await apiPost('shop_redeem', { playerId: p.playerId, itemId, pointsUsed: cost });
    if (res.error) throw new Error(res.error.message);
    showToast(res.message || `${name} と交換申請しました`);
  } catch (e) { showToast(e.message, true); }
}

// ── トースト ──────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error show' : 'show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 起動 ─────────────────────────────────────────────
document.getElementById('app').style.visibility = 'hidden';
boot();
</script>
